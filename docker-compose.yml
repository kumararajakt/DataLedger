# Compose Spec (no version field — compatible with Docker Compose v2 and Podman Compose)
# Podman: use `podman compose` (Podman 4.4+) or `podman-compose`
# Docker:  use `docker compose` (Compose V2)

services:
  # ── Database ──────────────────────────────────────────────────────────────
  postgres: 
    image: postgres:14-alpine
    container_name: finance-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_tracker
    ports:
      - "5432:5432"
    volumes:
      # :z — shared SELinux label; required on RHEL/Fedora with Podman, harmless on Docker
      - postgres_data:/var/lib/postgresql/data:z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: finance-tracker-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin:z

  # ── PDF Microservice (Python/FastAPI) ─────────────────────────────────────
  pdf-service:
    build:
      context: ./pdf-service
      dockerfile: Dockerfile
    container_name: finance-tracker-pdf
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - ENABLE_OCR=false
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Backend API (Node.js/Express) ─────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: finance-tracker-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/finance_tracker
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      AI_ENCRYPTION_KEY: ${AI_ENCRYPTION_KEY}
      PORT: 3001
      NODE_ENV: production
      # Port 8080 matches the nginx-unprivileged client below
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      PDF_SERVICE_URL: http://pdf-service:5001
    depends_on:
      postgres:
        condition: service_healthy
      pdf-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend (React + nginx-unprivileged) ─────────────────────────────────
  # Runs as non-root on port 8080 — compatible with rootless Podman
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: finance-tracker-client
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      server:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data:
